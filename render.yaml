# Blueprint Render — API Docker + PostgreSQL
# https://render.com/docs/blueprint-spec
#
# Deploy: Dashboard → New → Blueprint → conecte o repositório
# Depois defina FRONTEND_URL com a URL do Netlify (ex.: https://girodacopa.netlify.app)

services:
  - type: web
    name: girodacopa-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: girodacopa-db
          property: connectionString
      - key: Jwt__Issuer
        value: GiroDaCopa
      - key: Jwt__Audience
        value: GiroDaCopa
      - key: Jwt__Secret
        generateValue: true
      - key: Admin__Username
        value: admin
      - key: Admin__Password
        generateValue: true
      - key: FRONTEND_URL
        sync: false

databases:
  - name: girodacopa-db
    databaseName: worldcup
    plan: free
    ipAllowList: []
